<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#247DFF"/>
      <stop offset="60%" stop-color="#7C50F5"/>
      <stop offset="100%" stop-color="#8A0ADD"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7C50F5" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#247DFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#247DFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#07091A" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="#F8F7FD"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- connectors from hub to each channel node -->
  <g stroke="url(#g1)" stroke-width="4" opacity="0.45">
    <line x1="400" y1="225" x2="160" y2="110"/>
    <line x1="400" y1="225" x2="640" y2="110"/>
    <line x1="400" y1="225" x2="160" y2="340"/>
    <line x1="400" y1="225" x2="640" y2="340"/>
  </g>

  <!-- channel nodes -->
  <!-- store -->
  <g transform="translate(160,110)">
    <circle r="46" fill="#FFFFFF" stroke="url(#g1)" stroke-width="3"/>
    <path d="M-20 6 V16 H20 V6" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-24 6 L-16 -14 H16 L24 6 Z" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linejoin="round"/>
    <rect x="-6" y="0" width="12" height="16" fill="url(#g1)"/>
  </g>

  <!-- mobile -->
  <g transform="translate(640,110)">
    <circle r="46" fill="#FFFFFF" stroke="url(#g1)" stroke-width="3"/>
    <rect x="-14" y="-20" width="28" height="40" rx="6" fill="none" stroke="url(#g1)" stroke-width="4"/>
    <circle cx="0" cy="13" r="2.4" fill="url(#g1)"/>
  </g>

  <!-- web / online -->
  <g transform="translate(160,340)">
    <circle r="46" fill="#FFFFFF" stroke="url(#g1)" stroke-width="3"/>
    <circle r="20" fill="none" stroke="url(#g1)" stroke-width="4"/>
    <ellipse rx="9" ry="20" fill="none" stroke="url(#g1)" stroke-width="3.5"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="url(#g1)" stroke-width="3.5"/>
  </g>

  <!-- warehouse / fulfillment -->
  <g transform="translate(640,340)">
    <circle r="46" fill="#FFFFFF" stroke="url(#g1)" stroke-width="3"/>
    <rect x="-18" y="-14" width="36" height="28" rx="3" fill="none" stroke="url(#g1)" stroke-width="4"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="url(#g1)" stroke-width="3.5"/>
    <line x1="0" y1="-14" x2="0" y2="0" stroke="url(#g1)" stroke-width="3.5"/>
  </g>

  <!-- central hub -->
  <circle cx="400" cy="225" r="58" fill="url(#g1)"/>
  <circle cx="400" cy="225" r="58" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  <circle cx="400" cy="225" r="16" fill="#F8F7FD"/>
</svg>
