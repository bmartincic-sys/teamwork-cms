<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#247DFF"/>
      <stop offset="60%" stop-color="#7C50F5"/>
      <stop offset="100%" stop-color="#8A0ADD"/>
    </linearGradient>
    <linearGradient id="barFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#247DFF"/>
      <stop offset="100%" stop-color="#7C50F5"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#247DFF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7C50F5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7C50F5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#07091A" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="#F8F7FD"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- ascending bars: retail POS adoption growing over time -->
  <g opacity="0.9">
    <rect x="120" y="330" width="66" height="70" rx="12" fill="url(#barFade)" opacity="0.35"/>
    <rect x="216" y="280" width="66" height="120" rx="12" fill="url(#barFade)" opacity="0.5"/>
    <rect x="312" y="230" width="66" height="170" rx="12" fill="url(#barFade)" opacity="0.68"/>
    <rect x="408" y="170" width="66" height="230" rx="12" fill="url(#barFade)" opacity="0.85"/>
    <rect x="504" y="110" width="66" height="290" rx="12" fill="url(#g1)"/>
  </g>

  <!-- trend line across bar tops -->
  <polyline points="153,330 249,280 345,230 441,170 537,110" fill="none" stroke="#0B1020" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <g fill="#0B1020" opacity="0.7">
    <circle cx="153" cy="330" r="6"/>
    <circle cx="249" cy="280" r="6"/>
    <circle cx="345" cy="230" r="6"/>
    <circle cx="441" cy="170" r="6"/>
    <circle cx="537" cy="110" r="7"/>
  </g>

  <!-- mobile POS device at the peak -->
  <g transform="translate(596,60)">
    <rect x="0" y="0" width="112" height="150" rx="18" fill="#0B1020"/>
    <rect x="8" y="14" width="96" height="122" rx="8" fill="url(#g1)"/>
    <rect x="20" y="30" width="72" height="10" rx="5" fill="#F8F7FD" opacity="0.85"/>
    <rect x="20" y="50" width="50" height="8" rx="4" fill="#F8F7FD" opacity="0.55"/>
    <rect x="20" y="66" width="60" height="8" rx="4" fill="#F8F7FD" opacity="0.55"/>
    <rect x="20" y="98" width="72" height="26" rx="8" fill="#F8F7FD" opacity="0.9"/>
  </g>
</svg>
